<!DOCTYPE html>
<html>
<head>
<title>Cadet Verification - Cadet College Kharan</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-image: url(logo.png);
    background-size: cover;
    background-position: center;
}

.main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 600px;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    padding: 25px;
}

.header {
    text-align: center;
    border-bottom: 2px solid #004080;
    padding-bottom: 10px;
}

.header h1 {
    margin: 5px;
    color: #003366;
}

.header p {
    margin: 0;
    font-size: 14px;
    color: #555;
}

.photo {
    text-align: center;
    margin-top: 15px;
}

.photo img {
    width: 140px;
    height: 140px;
    border-radius: 8px;
    border: 3px solid #003366;
}

.details {
    margin-top: 20px;
    font-size: 18px;
}

.details p {
    margin: 8px 0;
}

.verified {
    margin-top: 20px;
    text-align: center;
    padding: 10px;
    background: #e6ffe6;
    border: 2px solid green;
    color: green;
    font-weight: bold;
    border-radius: 6px;
}

.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
    color: #777;
}

</style>
</head>

<body>

<div class="main">

<div class="card">

<div class="header">
<h1>Cadet College Kharan</h1>
<p>Official Cadet Verification Portal</p>
</div>

<div class="photo">
<img src="cadet.png" alt="Cadet Photo">
</div>

<div class="details">
<p><strong>Name:</strong> Zain Uddin</p>
<p><strong>College No:</strong> 102</p>
<p><strong>District:</strong> Noshki</p>
<p><strong>Batch:</strong> 2nd</p>
</div>

<div class="verified">
✔ Verified Cadet of Cadet College Kharan
</div>

<div class="footer">
Scan QR Code on Student ID Card for Verification
</div>

</div>

</div>

</body>
</html>
